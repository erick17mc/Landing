<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MundoSmartkids™ Focus System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <div id="header-component"></div>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div id="hero-pricing-component"></div>
        <div id="features-benefits-component"></div>
        <div id="testimonials-component"></div>
        <div id="faq-component"></div>
    </main>

    <div id="footer-component"></div>

    <script>
        async function cargarComponente(id, ruta) {
            try {
                const response = await fetch(ruta);
                if (response.ok) {
                    document.getElementById(id).innerHTML = await response.text();
                    initThumbnailCarousel();
                }
            } catch (error) {
                console.error(`Error al cargar el componente ${ruta}:`, error);
            }
        }

        function initThumbnailCarousel() {
            document.querySelectorAll('.carousel-container').forEach(container => {
                if (container.dataset.carouselInit === 'true') return;
                container.dataset.carouselInit = 'true';

                const track = container.querySelector('.carousel-track');
                const prev = container.querySelector('.carousel-prev');
                const next = container.querySelector('.carousel-next');
                const overlay = container.querySelector('.carousel-overlay');
                const overlayVideo = container.querySelector('.carousel-overlay-video');
                const overlayClose = container.querySelector('.carousel-overlay-close');
                if (!track || !prev || !next || !overlay || !overlayVideo || !overlayClose) return;

                const scrollAmount = track.clientWidth * 0.75;
                let autoScrollTimer = null;

                function startAutoScroll() {
                    if (autoScrollTimer) return;
                    autoScrollTimer = setInterval(() => {
                        const maxScroll = track.scrollWidth - track.clientWidth;
                        if (track.scrollLeft >= maxScroll - 10) {
                            track.scrollTo({ left: 0, behavior: 'smooth' });
                        } else {
                            track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                        }
                    }, 3500);
                }

                function stopAutoScroll() {
                    if (!autoScrollTimer) return;
                    clearInterval(autoScrollTimer);
                    autoScrollTimer = null;
                }

                prev.addEventListener('click', () => {
                    stopAutoScroll();
                    track.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                    startAutoScroll();
                });

                next.addEventListener('click', () => {
                    stopAutoScroll();
                    track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                    startAutoScroll();
                });

                track.addEventListener('mouseenter', stopAutoScroll);
                track.addEventListener('mouseleave', startAutoScroll);
                prev.addEventListener('mouseenter', stopAutoScroll);
                next.addEventListener('mouseenter', stopAutoScroll);

                function openOverlay(sourceUrl, item) {
                    overlayVideo.src = sourceUrl;
                    overlayVideo.load();
                    overlayVideo.play().catch(() => {});
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    container.querySelectorAll('.carousel-item').forEach(el => el.classList.remove('active'));
                    if (item) item.classList.add('active');
                }

                function closeOverlay() {
                    overlayVideo.pause();
                    overlayVideo.currentTime = 0;
                    overlay.classList.add('hidden');
                    overlay.classList.remove('flex');
                    container.querySelectorAll('.carousel-item').forEach(el => el.classList.remove('active'));
                }

                overlayClose.addEventListener('click', closeOverlay);
                overlay.addEventListener('click', (event) => {
                    if (event.target === overlay) {
                        closeOverlay();
                    }
                });

                container.querySelectorAll('.carousel-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const sourceUrl = item.dataset.videoSrc;
                        if (!sourceUrl) return;
                        stopAutoScroll();
                        openOverlay(sourceUrl, item);
                    });
                });

                startAutoScroll();
            });
        }

        // Carga en paralelo de todos los bloques
        document.addEventListener("DOMContentLoaded", () => {
            cargarComponente('header-component', 'components/header.html');
            cargarComponente('hero-pricing-component', 'components/hero-pricing.html');
            cargarComponente('features-benefits-component', 'components/features-benefits.html');
            cargarComponente('testimonials-component', 'components/testimonials.html');
            cargarComponente('faq-component', 'components/faq.html');
            cargarComponente('footer-component', 'components/footer.html');
        });
    </script>
</body>
</html>
